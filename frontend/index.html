<!DOCTYPE html>
<html lang="es">
    


<head>
    <meta charset="UTF-8">
    <title>TecnoSuper Nariño</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div id="loginModal" class="modal hidden">
    <div class="modal-content">

        <h2>Iniciar sesión 💜</h2>

        <input type="email" id="emailLogin" placeholder="Correo">
        <input type="password" id="passwordLogin" placeholder="Contraseña">

        <button id="btnLoginModal">Ingresar</button>
        <button onclick="cerrarModal()">Cancelar</button>

    </div>
</div>

<header class="navbar">
    <h1 class="logo">TecnoSuper 💜</h1>
    <input type="text" id="buscador" placeholder="Buscar producto...">
    <a href="carrito.html">🛒 Carrito</a>
    <span id="contadorCarrito">0</span>
    <div class="user-section">
    <span id="userInfo">Cliente</span>
    <a href="login.html">
    <button id="btnLoginNav">Iniciar sesión</button>
    </a>
    <button id="btnLogoutNav" style="display:none;">Cerrar sesión</button>
</div>
</header>

<section id="filtros">

    <select id="orden">
        <option value="">Ordenar</option>
        <option value="precio_asc">Menor precio</option>
        <option value="precio_desc">Mayor precio</option>
        <option value="nombre">A-Z</option>
    </select>
</section>

<section id="lista-productos" class="grid"></section>

<script src="js/app.js"></script>
</body>
</html>
