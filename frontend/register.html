<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>Registro</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-container">

    <div class="card">

        <h2>Crear Cuenta 👤</h2>

        <input
            type="text"
            id="nombre"
            placeholder="Nombre"
        >

        <input
            type="email"
            id="email"
            placeholder="Correo"
        >

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
        >

        <button id="btnRegister">
            Registrarse
        </button>

        <p>
            ¿Ya tienes cuenta?
            <a href="login.html">Inicia sesión</a>
        </p>

    </div>

</div>

<script src="js/register.js"></script>

</body>
</html>
